apiVersion: infra.phenixforge.io/v1alpha1
kind: VLLMModel
metadata:
  name: mistral-7b-prod
  namespace: default
spec:
  modelId: "mistralai/Mistral-7B-Instruct-v0.3"
  replicas: 2
  storageSize: "30Gi"
  storageClass: "local-path"
  resources:
    limits:
      nvidia.com/gpu: "1"
      memory: "32Gi"
      cpu: "4"
    requests:
      nvidia.com/gpu: "1"
      memory: "16Gi"
      cpu: "2"
  env:
    - name: VLLM_MAX_MODEL_LEN
      value: "4096"
    - name: VLLM_TENSOR_PARALLEL_SIZE
      value: "1"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilization: 70
    targetMemoryUtilization: 80